<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KantongKu - Catatan Keuangan</title>
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="Aplikasi pencatatan keuangan terenkripsi dengan sistem kantong">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-gray-800 min-h-screen">

  <!-- ========== LOCK / AUTH SCREEN ========== -->
  <div id="lock-overlay" class="lock-overlay">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <div class="text-6xl mb-4">🔐</div>
        <h1 id="auth-title" class="text-2xl font-bold text-gray-800">Buat PIN Kamu</h1>
        <p id="auth-subtitle" class="text-gray-500 mt-2 text-sm">PIN 6 digit untuk mengamankan data</p>
      </div>

      <div class="flex justify-center gap-2.5 mb-5" id="pin-inputs">
        <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
        <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
        <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
        <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
        <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
        <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
      </div>

      <div id="auth-confirm-group" class="hidden">
        <p class="text-center text-sm text-gray-500 mb-3">Konfirmasi PIN</p>
        <div class="flex justify-center gap-2.5 mb-5" id="pin-confirm-inputs">
          <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
          <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
          <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
          <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
          <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
          <input type="tel" maxlength="1" class="pin-input" inputmode="numeric" pattern="[0-9]">
        </div>
      </div>

      <p id="auth-error" class="text-red-500 text-sm text-center mb-4 h-5"></p>
      <p id="auth-loading" class="text-indigo-500 text-sm text-center mb-4 h-5 hidden">Memproses...</p>

      <button id="auth-btn" onclick="App.handleAuth()" class="w-full py-3.5 bg-indigo-500 text-white rounded-xl font-semibold hover:bg-indigo-600 active:scale-[0.98] transition-all">
        Buat PIN
      </button>

      <div class="mt-6 text-center">
        <p class="text-xs text-gray-400">🔒 Data terenkripsi AES-256-GCM</p>
        <p class="text-xs text-gray-400 mt-1">Tidak bisa diakses tanpa PIN</p>
      </div>
    </div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div id="app" class="hidden min-h-screen pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-lg border-b border-slate-100 px-4 py-3">
      <div class="flex items-center justify-between max-w-lg mx-auto">
        <h1 id="header-title" class="text-lg font-bold text-indigo-500">KantongKu</h1>
        <div class="flex items-center gap-1">
          <button onclick="App.lockApp()" class="p-2 text-lg hover:bg-slate-100 rounded-lg transition-colors" title="Kunci">🔒</button>
          <button onclick="App.showNotifPanel()" id="notif-btn" class="relative p-2 text-xl hover:bg-slate-100 rounded-lg hidden transition-colors">
            🔔
            <span id="notif-badge" class="notif-badge hidden">0</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Views -->
    <main class="max-w-lg mx-auto px-4 py-4">

      <!-- Dashboard -->
      <div id="view-dashboard" class="view active">
        <div class="text-center mb-6 pt-2">
          <p class="text-sm text-gray-500">Total Saldo</p>
          <div class="flex items-center justify-center gap-1 mt-1">
            <span id="total-balance-sign" class="text-2xl font-bold"></span>
            <span id="total-balance" class="text-3xl font-bold text-gray-800">Rp0</span>
          </div>
        </div>
        <div id="notifications" class="space-y-2 mb-4"></div>
        <h2 class="font-semibold text-gray-700 mb-3">Kantong Saya</h2>
        <div id="kantong-list" class="space-y-3"></div>

        <!-- Riwayat Section -->
        <div id="riwayat-section" class="mt-6 hidden">
          <h2 class="font-semibold text-gray-700 mb-3">Riwayat Bulanan</h2>
          <div id="riwayat-list" class="space-y-2"></div>
        </div>
      </div>

      <!-- Kantong -->
      <div id="view-kantong" class="view">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-semibold text-gray-700 text-lg">Semua Kantong</h2>
          <button onclick="App.showAddKantong()" class="px-4 py-2 bg-indigo-500 text-white rounded-lg text-sm font-medium active:scale-95 transition-transform">+ Tambah</button>
        </div>
        <div id="kantong-view-list"></div>
      </div>

      <!-- Add Transaction -->
      <div id="view-add" class="view"></div>

      <!-- Chart -->
      <div id="view-chart" class="view">
        <div id="chart-content"></div>
      </div>

      <!-- Settings -->
      <div id="view-settings" class="view">
        <h2 class="font-semibold text-gray-700 text-lg mb-4">Pengaturan</h2>
        <div id="settings-content" class="space-y-3"></div>
      </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <div class="flex items-center justify-around max-w-lg mx-auto py-2 px-2">
        <button class="nav-item active" data-view="dashboard" onclick="App.showView('dashboard')">
          <span class="nav-icon">🏠</span>
          <span>Home</span>
        </button>
        <button class="nav-item" data-view="kantong" onclick="App.showView('kantong')">
          <span class="nav-icon">💰</span>
          <span>Kantong</span>
        </button>
        <button class="nav-add" onclick="App.showView('add')">+</button>
        <button class="nav-item" data-view="chart" onclick="App.showView('chart')">
          <span class="nav-icon">📊</span>
          <span>Grafik</span>
        </button>
        <button class="nav-item" data-view="settings" onclick="App.showView('settings')">
          <span class="nav-icon">⚙️</span>
          <span>Lainnya</span>
        </button>
      </div>
    </nav>
  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <script src="js/crypto.js"></script>
  <script src="js/store.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
